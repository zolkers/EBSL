plugins {
    id 'net.fabricmc.fabric-loom-remap'
}

apply from: rootProject.file('gradle/mc-version.gradle')

group = rootProject.findProperty('maven_group') ?: 'fr.riege.ebsl'
version = rootProject.findProperty('mod_version') ?: '1.0.0'

repositories {
    mavenCentral()
}

dependencies {
    rootProject.ext.ebslRuntimeClassModules.each { modulePath ->
        compileOnly project(modulePath)
        compileOnly files(project(modulePath).sourceSets.main.output.classesDirs)
    }

    minecraft "com.mojang:minecraft:${ebslMinecraftVersion}"
    mappings loom.officialMojangMappings()
    modCompileOnly "net.fabricmc:fabric-loader:${ebslFabricLoaderVersion}"
}

tasks.withType(JavaCompile).configureEach {
    rootProject.ext.ebslRuntimeClassModules.each { modulePath ->
        dependsOn project(modulePath).tasks.named('classes')
    }
}
