plugins {
    id 'java-library'
}

group = 'fr.riege.ebsl'
version = rootProject.findProperty('mod_version') ?: '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    api project(':common:base')
    api project(':common:events')
    api project(':common:world-api')
    api project(':common:render-api')
    api project(':common:platform-api')
    api project(':common:terminal')
    api project(':common:terminal-navigation')
    api project(':common:automation')
    api project(':common:analytics')
    api project(':common:scripting')
    api project(':common:pathfinder-core')
    api project(':common:pathfinder-execution')
    api project(':common:pathfinder-debug')
    api project(':common:navigation')

    compileOnly 'io.github.spair:imgui-java-binding:1.90.0'
    testImplementation 'io.github.spair:imgui-java-binding:1.90.0'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
}


tasks.named('compileJava') {
    doLast {
        def sources = fileTree('src/main/java').filter { it.name.endsWith('.java') }
        sources.each { file ->
            def content = file.text
            if (content.contains('net.minecraft.') || content.contains('net.fabricmc.')) {
                throw new GradleException("MC import detected in app: ${file.path}")
            }
        }
    }
}
