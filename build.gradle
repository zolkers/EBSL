plugins {
    id 'idea'
    id 'jacoco'
    id 'org.sonarqube' version '7.3.0.8198'
    id 'net.fabricmc.fabric-loom-remap' version "${loom_version}" apply false
}

apply from: rootProject.file('gradle/ebsl-modules.gradle')

subprojects {
    sonar {
        skipProject = true
    }

    def subPath = project.path.replace(':', '/').replaceFirst('^/', '')
    layout.buildDirectory = rootProject.layout.buildDirectory.dir(subPath)

    
    plugins.withId('java') {
        apply plugin: 'jacoco'
        tasks.withType(Jar).configureEach { zip64 = true }
    }
}

def coverageProjects = providers.provider {
    subprojects.findAll { it.plugins.hasPlugin('java') && it.extensions.findByName('sourceSets') != null }
}

def sonarMainSourceDirs = providers.provider {
    coverageProjects.get().collectMany { it.extensions.sourceSets.main.allJava.srcDirs }.findAll { it.exists() }
}

def sonarTestSourceDirs = providers.provider {
    coverageProjects.get().collectMany { it.extensions.sourceSets.test.allJava.srcDirs }.findAll { it.exists() }
}

def sonarMainBinaryDirs = providers.provider {
    coverageProjects.get().collectMany { it.extensions.sourceSets.main.output.classesDirs.files }.findAll { it.exists() }
}

def sonarTestBinaryDirs = providers.provider {
    coverageProjects.get().collectMany { it.extensions.sourceSets.test.output.classesDirs.files }.findAll { it.exists() }
}

def coverageClassExcludes = [
    'fr/riege/ebsl/common/*.class',
    'fr/riege/ebsl/common/api/**',
    'fr/riege/ebsl/common/core/event/**',
    'fr/riege/ebsl/common/core/log/**',
    'fr/riege/ebsl/common/core/settings/**',
    'fr/riege/ebsl/common/domain/analytics/**',
    'fr/riege/ebsl/common/domain/entity/**',
    'fr/riege/ebsl/common/domain/packet/**',
    'fr/riege/ebsl/common/feature/aim/**',
    'fr/riege/ebsl/common/feature/module/**',
    'fr/riege/ebsl/common/feature/scripting/command/**',
    'fr/riege/ebsl/common/feature/scripting/conditions/**',
    'fr/riege/ebsl/common/feature/scripting/enums/**',
    'fr/riege/ebsl/common/feature/scripting/highlight/**',
    'fr/riege/ebsl/common/feature/scripting/nodes/**',
    'fr/riege/ebsl/common/feature/scripting/registry/**',
    'fr/riege/ebsl/common/feature/scripting/runtime/**',
    'fr/riege/ebsl/common/feature/task/**',
    'fr/riege/ebsl/common/feature/terminal/**',
    'fr/riege/ebsl/common/feature/ui/**',
    'fr/riege/ebsl/common/math/**',
    'fr/riege/ebsl/common/navigation/**',
    'fr/riege/ebsl/common/pathfinding/*.class',
    'fr/riege/ebsl/common/pathfinding/annotation/**',
    'fr/riege/ebsl/common/pathfinding/api/**',
    'fr/riege/ebsl/common/pathfinding/block/**',
    'fr/riege/ebsl/common/pathfinding/check/**',
    'fr/riege/ebsl/common/pathfinding/debug/**',
    'fr/riege/ebsl/common/pathfinding/diagnostics/**',
    'fr/riege/ebsl/common/pathfinding/execution/**',
    'fr/riege/ebsl/common/pathfinding/goal/**',
    'fr/riege/ebsl/common/pathfinding/movement/types/evaluation/**',
    'fr/riege/ebsl/common/pathfinding/movement/types/execution/**',
    'fr/riege/ebsl/common/pathfinding/movement/PathSmoother.class',
    'fr/riege/ebsl/common/pathfinding/parkour/ParkourJumpPlanner.class',
