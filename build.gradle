plugins {
    id 'base'
    id 'idea'
    id 'jacoco'
    id 'org.sonarqube' version '7.3.0.8198'
    id 'net.fabricmc.fabric-loom-remap' version "${loom_version}" apply false
}

apply from: rootProject.file('gradle/ebsl-modules.gradle')

subprojects {
    sonar {
        skipProject = true
    }

    def subPath = project.path.replace(':', '/').replaceFirst('^/', '')
    layout.buildDirectory = rootProject.layout.buildDirectory.dir(subPath)

    
    plugins.withId('java') {
        apply plugin: 'jacoco'
        tasks.withType(Jar).configureEach { zip64 = true }
    }
}

def coverageProjects = providers.provider {
    subprojects.findAll { it.plugins.hasPlugin('java') && it.extensions.findByName('sourceSets') != null }
}

def coverageTestTasks = providers.provider {
    coverageProjects.get().collectMany { project ->
        project.tasks.withType(Test).toList()
    }
}

def jacocoExecutionData = providers.provider {
    coverageTestTasks.get().collect { testTask ->
        testTask.extensions.getByType(JacocoTaskExtension).destinationFile
    }
}

def sonarMainSourceDirs = providers.provider {
    coverageProjects.get().collectMany { it.extensions.sourceSets.main.allJava.srcDirs }.findAll { it.exists() }
}

def sonarTestSourceDirs = providers.provider {
    coverageProjects.get().collectMany { it.extensions.sourceSets.test.allJava.srcDirs }.findAll { it.exists() }
}

def sonarMainBinaryDirs = providers.provider {
    coverageProjects.get().collectMany { it.extensions.sourceSets.main.output.classesDirs.files }.findAll { it.exists() }
}

def sonarTestBinaryDirs = providers.provider {
    coverageProjects.get().collectMany { it.extensions.sourceSets.test.output.classesDirs.files }.findAll { it.exists() }
}

