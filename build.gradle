    'fr/riege/ebsl/common/world/layer/**',
    'fr/riege/ebsl/fabric/**',
    'fr/riege/ebsl/loader/**',
    'fr/riege/ebsl/mc/**'
]

def sonarCoverageExclusions = coverageClassExcludes.collect {
    'modules/**/src/main/java/' + it
        .replace('*.class', '*.java')
        .replace('.class', '.java')
}

tasks.register('jacocoRootReport', JacocoReport) {
    group = 'verification'
    description = 'Generates an aggregate JaCoCo coverage report for all Java modules.'

    dependsOn providers.provider {
        coverageProjects.get().collect { it.tasks.matching { task -> task.name == 'test' } }
    }

    executionData.from(fileTree(layout.buildDirectory) {
        include '**/jacoco/*.exec'
    })

    sourceDirectories.from(providers.provider {
        coverageProjects.get().collect { it.extensions.sourceSets.main.allSource.srcDirs }
    })
    classDirectories.from(providers.provider {
        coverageProjects.get().collect {
            it.extensions.sourceSets.main.output.asFileTree.matching {
                exclude '**/mixin/**'
                exclude '**/generated/**'
                exclude coverageClassExcludes
            }
        }
    })

    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
}

tasks.register('jacocoCoverageVerification', JacocoCoverageVerification) {
    group = 'verification'
    description = 'Verifies aggregate line coverage is at least 80%.'
    dependsOn tasks.named('jacocoRootReport')

    executionData.from(fileTree(layout.buildDirectory) {
        include '**/jacoco/*.exec'
    })
    sourceDirectories.from(providers.provider {
        coverageProjects.get().collect { it.extensions.sourceSets.main.allSource.srcDirs }
    })
    classDirectories.from(providers.provider {
        coverageProjects.get().collect {
            it.extensions.sourceSets.main.output.asFileTree.matching {
                exclude '**/mixin/**'
                exclude '**/generated/**'
                exclude coverageClassExcludes
            }
        }
    })

    violationRules {
        rule {
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.80
            }
        }
    }
}

tasks.register('sonarCoverageVerification') {
    group = 'verification'
    description = 'Verifies aggregate Sonar-style coverage is at least 80%.'
    dependsOn tasks.named('jacocoRootReport')

    doLast {
        def report = layout.buildDirectory.file('reports/jacoco/jacocoRootReport/jacocoRootReport.xml').get().asFile
        def text = report.getText('UTF-8')
        def counters = [:]
        (text =~ /<counter type="(LINE|BRANCH)" missed="(\d+)" covered="(\d+)"\/>/).each { match ->
            counters[match[1]] = [missed: match[2].toInteger(), covered: match[3].toInteger()]
        }

        if (!counters.LINE || !counters.BRANCH) {
            throw new GradleException('JaCoCo aggregate report is missing LINE or BRANCH counters.')
        }

        def lineMissed = counters.LINE.missed
        def lineCovered = counters.LINE.covered
        def branchMissed = counters.BRANCH.missed
        def branchCovered = counters.BRANCH.covered
        def covered = lineCovered + branchCovered
        def total = covered + lineMissed + branchMissed
        def ratio = covered / total

        if (ratio < 0.80) {
            throw new GradleException(String.format(
                'Aggregate Sonar-style coverage is %.2f%%, expected at least 80%%.',
                ratio * 100
            ))
        }

        logger.lifecycle(String.format(
            'Aggregate Sonar-style coverage is %.2f%%.',
            ratio * 100
        ))
    }
}

allprojects {
    apply plugin: 'idea'

    repositories {
        mavenCentral()
    }

    idea {
        module {
            name = project == rootProject
                ? rootProject.name
                : project.path.substring(1).replace(':', '-')
        }
    }
}



tasks.register('runClient121Fabric') {
    group = 'ebsl'
    description = 'Run Minecraft 1.21.11 (Fabric) client'
    dependsOn ':minecraft-1-21-11:fabric:runClient'
}

tasks.register('buildMod121Fabric') {
    group = 'ebsl'
    description = 'Build Minecraft 1.21.11 (Fabric) mod jar'
    dependsOn ':minecraft-1-21-11:fabric:build'
}

sonar {
    properties {
        property 'sonar.projectKey', 'EBSL'
        property 'sonar.projectName', 'EBSL'
        property 'sonar.sourceEncoding', 'UTF-8'
        property 'sonar.sources', sonarMainSourceDirs.get()
        property 'sonar.tests', sonarTestSourceDirs.get()
        property 'sonar.java.binaries', sonarMainBinaryDirs.get()
        property 'sonar.java.test.binaries', sonarTestBinaryDirs.get()
        property 'sonar.java.libraries', sonarMainBinaryDirs.get()
        property 'sonar.java.test.libraries', sonarMainBinaryDirs.get()
        property 'sonar.coverage.jacoco.xmlReportPaths',
            layout.buildDirectory.file('reports/jacoco/jacocoRootReport/jacocoRootReport.xml').get().asFile.path
        property 'sonar.coverage.exclusions', sonarCoverageExclusions.join(',')
    }
}

tasks.named('sonar') {
    dependsOn tasks.named('sonarCoverageVerification')
}
