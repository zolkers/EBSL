services:
  sonarqube-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${SONAR_POSTGRES_USER:-sonarqube}
      POSTGRES_PASSWORD: ${SONAR_POSTGRES_PASSWORD:-sonarqube}
      POSTGRES_DB: ${SONAR_POSTGRES_DB:-sonarqube}
    volumes:
      - sonarqube_db:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:community
    depends_on:
      - sonarqube-db
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/${SONAR_POSTGRES_DB:-sonarqube}
      SONAR_JDBC_USERNAME: ${SONAR_POSTGRES_USER:-sonarqube}
      SONAR_JDBC_PASSWORD: ${SONAR_POSTGRES_PASSWORD:-sonarqube}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  pathfinder-sim-viewer:
    build:
      context: .
      dockerfile: docker/pathfinder-sim-viewer.Dockerfile
    ports:
      - "${VIEWER_PORT:-8087}:8087"
    environment:
      VIEWER_PORT: 8087
      VIEWER_BIND_ADDRESS: 0.0.0.0
      VIEWER_REPLAY_DIR: /data/replays
      NODE_EXECUTABLE: node
    volumes:
      - ${VIEWER_WORLD_DIR:-./run/saves}:/workspace/run/saves:ro
      - ${VIEWER_REPLAY_DIR:-./run/config/ebsl/replays}:/data/replays
      - pathfinder_sim_gradle:/gradle-cache

volumes:
  sonarqube_db:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  pathfinder_sim_gradle:
