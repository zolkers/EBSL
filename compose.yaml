services:
  sonarqube-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${SONAR_POSTGRES_USER:-sonarqube}
      POSTGRES_PASSWORD: ${SONAR_POSTGRES_PASSWORD:-sonarqube}
      POSTGRES_DB: ${SONAR_POSTGRES_DB:-sonarqube}
    volumes:
      - sonarqube_db:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:community
    depends_on:
      - sonarqube-db
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/${SONAR_POSTGRES_DB:-sonarqube}
      SONAR_JDBC_USERNAME: ${SONAR_POSTGRES_USER:-sonarqube}
      SONAR_JDBC_PASSWORD: ${SONAR_POSTGRES_PASSWORD:-sonarqube}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  sonarqube_db:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
